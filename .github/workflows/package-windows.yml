name: Package Windows

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create or update the release as a draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark the release as a pre-release"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  package:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: corepack pnpm@9.15.0 --dir frontend install --frozen-lockfile

      - name: Build Windows installer
        env:
          ECHOMINUTES_WORKSPACE_DIR: ${{ runner.temp }}\echominutes-workspace
        run: corepack pnpm@9.15.0 --dir frontend package:win

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echominutes-agent-windows
          path: release/**

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: EchoMinutes Agent ${{ inputs.tag_name }}
          body: |
            EchoMinutes Agent ${{ inputs.tag_name }} Windows release.

            Includes the NSIS installer and blockmap generated by the packaged Windows build.
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release/EchoMinutes Agent Setup *.exe
            release/EchoMinutes Agent Setup *.exe.blockmap
